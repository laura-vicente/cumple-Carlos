<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fotos 📸</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --blue:   #60b4ff;
      --blue2:  #3b9dff;
      --pink:   #ff6bb5;
      --purple: #c084fc;
      --bg:     #1a3a5c;
      --card:   #1e4470;
      --card2:  #163354;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── BOTÓN VOLVER ── */
    .back-btn {
      align-self: flex-start;
      margin-bottom: 36px;
      margin-left: 8px;
      text-decoration: none;
      background: transparent;
      border: 2px solid var(--blue);
      color: var(--blue);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 28px;
      border-radius: 50px;
      display: flex; align-items: center; gap: 6px;
      transition: background .2s, color .2s, box-shadow .2s;
    }
    .back-btn:hover {
      background: var(--blue);
      color: var(--bg);
      box-shadow: 0 0 20px #60b4ff88;
    }

    /* ── TÍTULO ── */
    .hero {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeDown .6s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      color: var(--blue);
      text-shadow: 0 0 24px #3b9dff66;
    }
    .hero p {
      color: #ffffff66;
      font-size: 1rem;
      margin-top: .5em;
    }

    /* ── GRID DE FOTOS ── */
    .photos-grid {
      display: flex;
      flex-direction: column;
      gap: 32px;
      width: 100%;
      max-width: 420px;
    }

    /* ── POLAROID ── */
    .polaroid {
      background: var(--card);
      border: 2px solid #ffffff10;
      border-radius: 16px;
      padding: 16px 16px 28px;
      box-shadow: 0 8px 32px -8px #00000066;
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
      transition: transform .3s, box-shadow .3s;
      position: relative;
    }
    .polaroid:nth-child(1) { animation-delay: .1s; transform: rotate(-1.5deg); }
    .polaroid:nth-child(2) { animation-delay: .2s; transform: rotate(1.2deg);  }
    .polaroid:nth-child(3) { animation-delay: .3s; transform: rotate(-0.8deg); }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.03) !important;
      box-shadow: 0 16px 48px -8px #00000088, 0 0 0 2px var(--blue);
      z-index: 2;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.75) translateY(30px); }
      to   { opacity: 1; }
    }

    /* marco de la foto */
    .photo-frame {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card2);
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* caption */
    .caption {
      margin-top: 14px;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      font-size: .95rem;
      color: #ffffffaa;
      font-weight: 700;
    }

    /* ── BOTÓN VOLVER ABAJO ── */
    .home-btn {
      margin-top: 44px;
      text-decoration: none;
      background: transparent;
      border: 2px solid var(--blue);
      color: var(--blue);
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px 28px;
      border-radius: 50px;
      transition: background .2s, color .2s, box-shadow .2s;
    }
    .home-btn:hover {
      background: var(--blue);
      color: var(--bg);
      box-shadow: 0 0 20px #60b4ff88;
    }

    /* ── MÚSICA ── */
    .music-bar {
      position: fixed;
      bottom: 22px; right: 22px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #16163ae8;
      border: 1.5px solid #ffffff1a;
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 10px 18px 10px 12px;
      box-shadow: 0 4px 24px #00000066;
    }
    #play-btn {
      background: linear-gradient(135deg, var(--blue), var(--purple));
      border: none; outline: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      flex-shrink: 0;
    }
    #play-btn:hover { transform: scale(1.12); box-shadow: 0 0 14px var(--blue); }
    .music-info { display: flex; flex-direction: column; gap: 2px; }
    .music-title { font-size: .78rem; color: #ffffffcc; font-weight: 700; }
    .music-sub   { font-size: .7rem;  color: #ffffff55; }
    .bars {
      display: flex; align-items: flex-end; gap: 3px; height: 20px;
    }
    .bar {
      width: 3px; background: var(--blue); border-radius: 2px;
      animation: equalizer .8s ease-in-out infinite alternate;
    }
    .bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
    .bar:nth-child(2) { animation-delay: .15s;  height: 16px; }
    .bar:nth-child(3) { animation-delay: .3s;   height: 10px; }
    .bar:nth-child(4) { animation-delay: .45s;  height: 18px; }
    .bar:nth-child(5) { animation-delay: .6s;   height: 6px; }
    .bars.paused .bar { animation-play-state: paused; }
    @keyframes equalizer {
      from { transform: scaleY(.3); }
      to   { transform: scaleY(1);  }
    }
  </style>
</head>
<body>

<a class="back-btn" href="index.html">← Volver al inicio</a>

<div class="hero">
  <h1> Fotitos </h1>
</div>

<div class="photos-grid">

  <!-- Foto 1 — cambia "foto1.jpg" por el nombre de tu archivo -->
  <div class="polaroid">
    <div class="photo-frame">
      <img src="foto1.jpeg" alt="Foto 1"/>
    </div>
    <p class="caption"> Foto 1</p>
  </div>

  <!-- Foto 2 — cambia "foto2.jpg" por el nombre de tu archivo -->
  <div class="polaroid">
    <div class="photo-frame">
      <img src="foto2.jpeg" alt="Foto 2"/>
    </div>
    <p class="caption"> Foto 2</p>
  </div>

  <!-- Foto 3 — cambia "foto3.jpg" por el nombre de tu archivo -->
  <div class="polaroid">
    <div class="photo-frame">
      <img src="foto3.jpeg" alt="Foto 3"/>
    </div>
    <p class="caption"> Foto 3</p>
  </div>

  <div class="polaroid">
    <div class="photo-frame">
      <img src="foto4.jpeg" alt="Foto 2"/>
    </div>
    <p class="caption"> Foto 4</p>
  </div>

</div>

<a class="home-btn" href="index.html">Volver al inicio</a>

<!-- Barra de música -->
<div class="music-bar">
  <button id="play-btn" title="Play / Pause">▶️</button>
  <div class="music-info">
    <span class="music-title"> Bad Bunny</span>
    <span class="music-sub">DtMF</span>
  </div>
  <div class="bars paused" id="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</div>

<!-- Audio — reemplaza "cancion.mp3" con tu archivo -->
<audio id="audio" loop>
  <source src="cancion2.mp3" type="audio/mpeg"/>
</audio>

<script>
  const btn   = document.getElementById('play-btn');
  const audio = document.getElementById('audio');
  const bars  = document.getElementById('bars');
  let playing = false;

  btn.addEventListener('click', () => {
    if (playing) {
      audio.pause();
      btn.textContent = '▶️';
      bars.classList.add('paused');
    } else {
      audio.play().catch(() => {});
      btn.textContent = '⏸️';
      bars.classList.remove('paused');
    }
    playing = !playing;
  });
</script>

</body>
</html>
