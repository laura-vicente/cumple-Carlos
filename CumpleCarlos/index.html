<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Feliz Cumple 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:    #ff6bb5;
      --yellow:  #ffe135;
      --cyan:    #3ff0e0;
      --purple:  #c084fc;
      --orange:  #ff9a3c;
      --bg:      #0d0d1a;
      --card:    #16163a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── CONFETI ── */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 18px;
      border-radius: 2px;
      top: -30px;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── FONDO GRADIENTE ANIMADO ── */
    .bg-glow {
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse at 20% 30%, #3b1a6a55 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 70%, #0a4a5555 0%, transparent 60%);
      animation: pulseGlow 6s ease-in-out infinite alternate;
    }
    @keyframes pulseGlow {
      from { opacity: .6; }
      to   { opacity: 1;  }
    }

    /* ── HERO ── */
    .hero {
      position: relative; z-index: 1;
      text-align: center;
      padding: 60px 20px 20px;
    }

    .cake-emoji {
      font-size: 5rem;
      display: block;
      animation: bounce 1.6s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-14px); }
    }

    h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.4rem, 8vw, 5rem);
      color: #60b4ff;
      text-shadow: 0 0 30px #3b9dffaa, 0 0 60px #3b9dff44;
      line-height: 1.2;
      margin-top: .3em;
    }

    .subtitle {
      color: #ffffff88;
      font-size: 1.1rem;
      margin-top: .5em;
      letter-spacing: .05em;
    }

    /* ── TARJETAS ── */
    .cards {
      position: relative; z-index: 1;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 40px 24px 60px;
      max-width: 900px;
    }

    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 36px 32px;
      width: 220px;
      cursor: pointer;
      text-align: center;
      border: 2px solid transparent;
      position: relative;
      overflow: hidden;
      transition: transform .25s, box-shadow .25s, border-color .25s;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      animation: popIn .6s cubic-bezier(.34,1.56,.64,1) both;
    }
    .card:nth-child(1) { animation-delay: .1s; --accent: var(--pink); }
    .card:nth-child(2) { animation-delay: .2s; --accent: var(--yellow); }
    .card:nth-child(3) { animation-delay: .3s; --accent: var(--cyan); }
    .card:nth-child(4) { animation-delay: .4s; --accent: var(--purple); }

    @keyframes popIn {
      from { opacity: 0; transform: scale(.6) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, var(--accent) 0%, transparent 70%);
      opacity: 0;
      transition: opacity .3s;
    }
    .card:hover::before { opacity: .15; }
    .card:hover {
      transform: translateY(-8px) scale(1.04);
      border-color: var(--accent);
      box-shadow: 0 12px 40px -8px var(--accent);
    }

    .card-icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 8px var(--accent));
      transition: transform .3s;
    }
    .card:hover .card-icon { transform: scale(1.2) rotate(-5deg); }

    .card-label {
      font-family: 'Pacifico', cursive;
      font-size: 1.25rem;
      color: var(--accent);
    }

    .card-desc {
      font-size: .85rem;
      color: #ffffff66;
      line-height: 1.4;
    }

    /* ── MÚSICA ── */
    .music-bar {
      position: fixed;
      bottom: 22px; right: 22px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 12px;
      background: #16163ae8;
      border: 1.5px solid #ffffff1a;
      backdrop-filter: blur(12px);
      border-radius: 50px;
      padding: 10px 18px 10px 12px;
      box-shadow: 0 4px 24px #00000066;
    }

    #play-btn {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      border: none; outline: none;
      width: 40px; height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      flex-shrink: 0;
    }
    #play-btn:hover { transform: scale(1.12); box-shadow: 0 0 14px var(--pink); }

    .music-info { display: flex; flex-direction: column; gap: 2px; }
    .music-title { font-size: .78rem; color: #ffffffcc; font-weight: 700; }
    .music-sub   { font-size: .7rem;  color: #ffffff55; }

    .bars {
      display: flex; align-items: flex-end; gap: 3px; height: 20px;
    }
    .bar {
      width: 3px; background: var(--cyan); border-radius: 2px;
      animation: equalizer .8s ease-in-out infinite alternate;
    }
    .bar:nth-child(1) { animation-delay: 0s;    height: 8px; }
    .bar:nth-child(2) { animation-delay: .15s;  height: 16px; }
    .bar:nth-child(3) { animation-delay: .3s;   height: 10px; }
    .bar:nth-child(4) { animation-delay: .45s;  height: 18px; }
    .bar:nth-child(5) { animation-delay: .6s;   height: 6px; }
    .bars.paused .bar { animation-play-state: paused; }

    @keyframes equalizer {
      from { transform: scaleY(.3); }
      to   { transform: scaleY(1);  }
    }

    /* ── ESTRELLAS ── */
    .star {
      position: fixed;
      width: 4px; height: 4px;
      background: white;
      border-radius: 50%;
      pointer-events: none;
      animation: twinkle ease-in-out infinite;
    }
    @keyframes twinkle {
      0%,100% { opacity: .1; transform: scale(1); }
      50%      { opacity: .9; transform: scale(1.6); }
    }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<!-- Estrellas -->
<script>
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}vw;top:${Math.random()*100}vh;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*5}s`;
    document.body.appendChild(s);
  }
</script>

<!-- Confeti -->
<script>
  const colors = ['#ff6bb5','#ffe135','#3ff0e0','#c084fc','#ff9a3c','#6efb8a'];
  for (let i = 0; i < 35; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `
      left:${Math.random()*100}vw;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${4+Math.random()*6}s;
      animation-delay:${Math.random()*8}s;
      width:${6+Math.random()*8}px;
      height:${12+Math.random()*14}px;
      border-radius:${Math.random()>0.5?'50%':'2px'};
    `;
    document.body.appendChild(c);
  }
</script>

<!-- Hero -->
<header class="hero">
  <span class="cake-emoji">🎂</span>
  <h1>¡Feliz Cumpleaños!</h1>
</header>

<!-- Tarjetas menú -->
<main class="cards">
  <a class="card" href="carta.html">
    <span class="card-icon">💌</span>
    <span class="card-label">Carta</span>
  </a>

  <a class="card" href="fotos.html">
    <span class="card-icon">📸</span>
    <span class="card-label">Fotos</span>
  </a>
</main>

<!-- Barra de música -->
<div class="music-bar">
  <button id="play-btn" title="Play / Pause">▶️</button>
  <div class="music-info">
    <span class="music-title">🎵 La que si me gusta jajaj</span>
    <span class="music-sub">El lokeron</span>
  </div>
  <div class="bars paused" id="bars">
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
    <div class="bar"></div>
  </div>
</div>

<!-- Audio — reemplaza "cancion.mp3" con tu archivo -->
<audio id="audio" loop>
  <source src="cancion.mp3" type="audio/mpeg"/>
</audio>

<script>
  const btn   = document.getElementById('play-btn');
  const audio = document.getElementById('audio');
  const bars  = document.getElementById('bars');
  let playing = false;

  btn.addEventListener('click', () => {
    if (playing) {
      audio.pause();
      btn.textContent = '▶️';
      bars.classList.add('paused');
    } else {
      audio.play().catch(() => {});
      btn.textContent = '⏸️';
      bars.classList.remove('paused');
    }
    playing = !playing;
  });
</script>

</body>
</html>
